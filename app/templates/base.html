<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title if title else 'ContractFill' }}</title>
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Наши стили -->
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="/static/modern.css">
</head>
<body class="bg-body-tertiary">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-semibold" href="/dashboard">
      <i class="fas fa-file-contract"></i> ContractFill
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link" href="/dashboard"><i class="fas fa-home"></i> Главная</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/clients"><i class="fas fa-users"></i> Клиенты</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/documents"><i class="fas fa-file-alt"></i> Документы</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="fas fa-car"></i> Авто
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/dkp"><i class="fas fa-handshake"></i> ДКП</a></li>
            <li><a class="dropdown-item" href="/util"><i class="fas fa-file-invoice"></i> Утильсбор</a></li>
          </ul>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="fas fa-file-invoice-dollar"></i> Документы
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/proxy"><i class="fas fa-file-signature"></i> Доверенность</a></li>
            <li><a class="dropdown-item" href="/invoice"><i class="fas fa-receipt"></i> Счёт</a></li>
            <li><a class="dropdown-item" href="/kvit"><i class="fas fa-money-check"></i> Квитанция</a></li>
            <li><a class="dropdown-item" href="/tpo"><i class="fas fa-box"></i> ТПО</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/settings"><i class="fas fa-cog"></i> Настройки</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin"><i class="fas fa-tools"></i> Админ</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function filterCards() {
    const q = (document.getElementById('q')?.value || '').toLowerCase();
    const company = (document.getElementById('company')?.value || '').toLowerCase();
    document.querySelectorAll('[data-card]').forEach(card => {
      const hay = (card.getAttribute('data-hay') || '').toLowerCase();
      const okQ = hay.includes(q);
      const okC = !company || hay.includes(company);
      card.style.display = (okQ && okC) ? '' : 'none';
    });
  }
</script>
</body>
</html>

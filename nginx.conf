# Nginx конфигурация для ContractFill
# Поместите этот файл в /etc/nginx/sites-available/contractfill
# и создайте симлинк: sudo ln -s /etc/nginx/sites-available/contractfill /etc/nginx/sites-enabled/

upstream contractfill_backend {
    # Если используете uvicorn напрямую
    server 127.0.0.1:8000;
    
    # Если используете несколько воркеров для балансировки нагрузки
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
}

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    # Или для локальной сети: server_name 192.168.1.100;
    
    # Максимальный размер загружаемых файлов
    client_max_body_size 50M;
    
    # Логи
    access_log /var/log/nginx/contractfill_access.log;
    error_log /var/log/nginx/contractfill_error.log;
    
    # Сжатие gzip для ускорения
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/xml+rss application/json;
    
    # Статические файлы
    location /static/ {
        alias /путь/к/вашему/contract_filler_app/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Загруженные файлы
    location /uploads/ {
        alias /путь/к/вашему/contract_filler_app/app/data/uploads/;
        expires 7d;
    }
    
    # Сгенерированные файлы
    location /generated/ {
        alias /путь/к/вашему/contract_filler_app/app/data/generated/;
        expires 1h;
    }
    
    # Проксирование на FastAPI backend
    location / {
        proxy_pass http://contractfill_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket поддержка (если понадобится в будущем)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Таймауты
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

